# render.yaml
# Alternative: deploy the backend on Render instead of Railway

services:
  - type: web
    name: mathapp-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # Set this manually in the Render dashboard
    healthCheckPath: /
